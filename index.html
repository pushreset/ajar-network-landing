<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AJAR Network, Access to Justice Action Research</title>
  <link rel="icon" type="image/png" href="logo_ajar.png">
  <meta name="description" content="AJAR Network supports rights and access to justice for precariously housed and unhoused people and those who depend on public space.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Archivo:wght@400;500;600;700&family=Noto+Sans+Gurmukhi:wght@400;600;700&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">

    <!-- four-direction ribbon -->
    <div class="ribbon">
      <div class="ribbon-seg ribbon-ink"></div>
      <div class="ribbon-seg ribbon-red"></div>
      <div class="ribbon-seg ribbon-yellow"></div>
      <div class="ribbon-seg ribbon-cream"></div>
    </div>

    <!-- header -->
    <header class="header">
      <div class="wordmark">
        <img class="wordmark-logo" src="logo_ajar.png" alt="AJAR Network logo">
        <span class="wordmark-ajar">AJAR</span>
        <span class="wordmark-network">Network</span>
      </div>
      <nav class="lang-pills" id="langPills" aria-label="Language selector"></nav>
    </header>

    <!-- hero -->
    <section class="hero">
      <div class="hero-inner">
        <div class="eyebrow">
          <span class="eyebrow-square"></span>
          <span class="eyebrow-text" data-i18n="subtitle"></span>
        </div>
        <h1 class="statement" data-i18n="statement"></h1>
      </div>
    </section>

    <!-- action band -->
    <section class="action-band">
      <div class="action-row">
        <div class="action-left">
          <div class="whatis-label" data-i18n="whatisLabel"></div>
          <p class="whatis" data-i18n="whatis"></p>
          <p class="cta-prompt" data-i18n="ctaPrompt"></p>
          <a href="https://cad-app.app.pushreset.fr/signalement" class="cta" target="_blank" rel="noopener noreferrer">
            <span data-i18n="cta"></span>
            <img class="cta-logo" src="logo_ajar.png" alt="">
          </a>
        </div>
        <div class="action-right">
          <div class="footer-links">
            <a href="mailto:praxismobilitiescollaborative@proton.me" data-i18n="contact"></a>
            <span class="divider">/</span>
            <a href="https://praxismobilitiescollaborative.org" data-i18n="about" target="_blank" rel="noopener noreferrer"></a>
          </div>
        </div>
      </div>
      <div class="credit">A project of the Praxis Mobilities Collaborative · Vancouver, Canada / Paris, France</div>
    </section>

  </div>
  <script src="app.js"></script>
</body>
</html>
